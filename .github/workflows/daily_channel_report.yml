name: Daily Channel Report (Acc Agg)

on:
  schedule:
    - cron: '0 3 * * *'   # 8:30 AM IST (UTC+5:30)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  send-channel-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run and send report
        env:
          SUPERSET_UN:        ${{ secrets.SUPERSET_UN }}
          SUPERSET_PASS:      ${{ secrets.SUPERSET_PASS }}
          CHANNEL_AUTH_TOKEN: ${{ secrets.CHANNEL_AUTH_TOKEN }}
        run: python send_daily_report_to_channel.py
