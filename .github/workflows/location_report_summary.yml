name: Field Sales Location Automation

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 3-12 * * *'

jobs:
  send-location-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run Python Script
        env:
          SUPERSET_UN: ${{ secrets.SUPERSET_UN }}
          SUPERSET_PASS: ${{ secrets.SUPERSET_PASS }}
          CHANNEL_AUTH_TOKEN: ${{ secrets.CHANNEL_AUTH_TOKEN }}

        run: python location_report_summary.py