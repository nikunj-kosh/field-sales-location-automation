name: Field Sales Location Automation

on:
  schedule:
    - cron: '*/30 3-12 * * *'
  workflow_dispatch:

jobs:
  send-location-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run location report script
        env:
          SUPERSET_UN: ${{ secrets.SUPERSET_UN }}
          SUPERSET_PASS: ${{ secrets.SUPERSET_PASS }}
          CHANNEL_AUTH_TOKEN: ${{ secrets.CHANNEL_AUTH_TOKEN }}

        run: python location_report_summary.py